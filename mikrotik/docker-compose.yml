version: '3.8'

services:
  mikrotik-scraper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mikrotik-headless
    volumes:
      - ./mikrotik_archive:/app/mikrotik_archive
    # Run in foreground (remove to run as daemon)
    # stdin_open: true
    # tty: true
    
    # Or uncomment below to run as daemon instead:
    # detach: true
    # restart: unless-stopped
