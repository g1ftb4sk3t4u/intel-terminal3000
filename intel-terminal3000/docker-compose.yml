services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8080:8080"
    environment:
      - DEBUG=false
      - RSS_ENABLED=true
      - GDELT_ENABLED=true
      - REDDIT_ENABLED=true
      - BLUESKY_ENABLED=true
      - TRIAGE_METHOD=keyword
      - GEOCODE_ENABLED=true
      - DATABASE_URL=sqlite:///./intel_terminal.db
    volumes:
      - ./data:/app/data
      - intel_db:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/articles?limit=1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    environment:
      - API_BASE_URL=http://backend:8080

volumes:
  intel_db:
