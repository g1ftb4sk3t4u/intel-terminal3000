services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=false
      - RSS_ENABLED=true
      - GDELT_ENABLED=true
      - REDDIT_ENABLED=false
      - BLUESKY_ENABLED=false
      - TRIAGE_METHOD=keyword
      - GEOCODE_ENABLED=true
    volumes:
      - ./data:/app/data
      - intel_db:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  intel_db:
