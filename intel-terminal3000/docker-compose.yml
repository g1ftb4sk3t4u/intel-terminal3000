version: "3.8"

x-backend-url: &backend-url http://backend:8080

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8080:8080"
    environment:
      - DEBUG=false
      - RSS_ENABLED=true
      - GDELT_ENABLED=true
      - REDDIT_ENABLED=true
      - BLUESKY_ENABLED=true
      - TRIAGE_METHOD=keyword
      - GEOCODE_ENABLED=true
      - DATABASE_URL=sqlite+aiosqlite:///./data/intel_terminal.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/articles?limit=1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend
    restart: unless-stopped
    environment:
      - API_BASE_URL=/api

  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

